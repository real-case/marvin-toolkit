<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marvin · Help</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        padding: 1.1rem 1.25rem;
      }
      /* Light theme: no widget background — the host's light surface shows
         through (removes the violet tint). Dark theme: the branded dark
         terminal panel. The background value is the host's own surface var so it
         can never desync from the host-driven text colours (falling back to the
         terminal black only when the host exposes no surface var). */
      @media (prefers-color-scheme: dark) {
        body {
          background: var(--color-background-primary, #0d0d13);
        }
      }
      :root[data-theme="light"] body {
        background: transparent;
      }
      :root[data-theme="dark"] body {
        background: var(--color-background-primary, #0d0d13);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
