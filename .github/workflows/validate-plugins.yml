name: Validate Plugins

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Least privilege: this workflow only reads the repo and runs checks.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install workspace dependencies
        run: npm ci

      - name: Lint manifests (marketplace + per-pack)
        run: node scripts/lint-manifests.mjs

      - name: Check docs for drift (ADR coverage + working-dir paths)
        run: npm run lint:docs

      - name: Lint source (ESLint)
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Build all workspaces
        run: npm run build

      - name: Test all workspaces
        run: npm run test

      - name: Coverage (text summary + lcov)
        if: matrix.node == '20'
        run: npm run coverage

      - name: Verify committed dist/ is in sync with source
        if: matrix.node == '20'
        run: node scripts/verify-dist.mjs

      - name: Verify committed widget HTML is in sync + self-contained
        if: matrix.node == '20'
        # Builds @marvin-toolkit/mcp-shared then @marvin-toolkit/widgets, then
        # hash-compares the committed plugins/marvin/widgets/*.html (ADR-0024).
        run: node scripts/verify-widgets.mjs

      - name: Storybook interaction tests (test-storybook)
        if: matrix.node == '20'
        run: |
          npx --yes playwright install --with-deps chromium
          npm run build-storybook --silent -w @marvin-toolkit/widgets
          npx --yes concurrently -k -s first -n "SB,TEST" \
            "npx --yes http-server packages/marvin-widgets/storybook-static --port 6006 --silent" \
            "npx --yes wait-on tcp:127.0.0.1:6006 && npm run test-storybook -w @marvin-toolkit/widgets"

      - name: Site e2e (Playwright)
        if: matrix.node == '22'
        # Astro 7 requires Node >=22.12, so the site build + e2e run only on the Node-22 leg
        # (the Node-20 leg no-ops the site build via packages/site/scripts/build.mjs). The
        # webServer runs `astro preview`, so the site is built first.
        run: |
          npm run build -w @marvin-toolkit/site
          npx --yes playwright install --with-deps chromium
          npm run test:e2e -w @marvin-toolkit/site

      - name: Smoke-test each pack MCP server
        run: |
          set -euo pipefail
          for server in plugins/*/mcp/server/dist/server.js; do
            pack=$(basename "$(dirname "$(dirname "$(dirname "$server")")")")
            echo "::group::smoke-test $pack"
            # stdio MCP servers respond to a single JSON-RPC initialize call.
            # We feed initialize via stdin, expect a non-empty response on stdout.
            response=$(printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"0"}}}' \
              | timeout 5 node "$server" 2>/dev/null | head -1 || true)
            if [ -z "$response" ]; then
              echo "ERROR: $pack server produced no response to initialize"
              exit 1
            fi
            echo "$response" | node -e "
              const line = require('fs').readFileSync(0, 'utf8').trim();
              const msg = JSON.parse(line);
              if (msg.error) { console.error('initialize failed:', msg.error); process.exit(1); }
              if (!msg.result || !msg.result.serverInfo) { console.error('no serverInfo in response'); process.exit(1); }
              console.log('OK:', msg.result.serverInfo.name, msg.result.serverInfo.version);
            "
            echo "::endgroup::"
          done

      - name: Smoke-test every command resolves over stdio
        run: node scripts/smoke-commands.mjs

      - name: Run claude plugin validate (if available)
        if: matrix.node == '20'
        continue-on-error: true
        run: |
          if command -v claude &> /dev/null; then
            claude plugin validate .
          else
            echo "Claude CLI not available in CI, skipping claude plugin validate"
          fi
