name: Validate Plugins

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace manifest
        run: |
          echo "Validating marketplace.json syntax..."
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json', 'utf8'))"
          echo "marketplace.json is valid JSON"

      - name: Validate plugin manifests
        run: |
          for plugin_json in plugins/*/.claude-plugin/plugin.json; do
            echo "Validating $plugin_json..."
            node -e "JSON.parse(require('fs').readFileSync('$plugin_json', 'utf8'))"
            echo "$plugin_json is valid JSON"
          done

      - name: Validate SKILL.md frontmatter
        run: |
          error=0
          for skill_file in plugins/*/skills/*/SKILL.md; do
            if ! head -1 "$skill_file" | grep -q "^---$"; then
              echo "ERROR: $skill_file missing frontmatter"
              error=1
            fi
            if ! grep -q "^description:" "$skill_file"; then
              echo "ERROR: $skill_file missing description in frontmatter"
              error=1
            fi
            echo "OK: $skill_file"
          done
          for agent_file in plugins/*/agents/*.md; do
            if ! head -1 "$agent_file" | grep -q "^---$"; then
              echo "ERROR: $agent_file missing frontmatter"
              error=1
            fi
            if ! grep -q "^description:" "$agent_file"; then
              echo "ERROR: $agent_file missing description in frontmatter"
              error=1
            fi
            echo "OK: $agent_file"
          done
          exit $error

      - name: Validate plugin structure
        run: |
          error=0
          marketplace_plugins=$(node -e "
            const m = JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json', 'utf8'));
            m.plugins.forEach(p => console.log(p.name));
          ")
          for plugin_name in $marketplace_plugins; do
            plugin_root="plugins/$plugin_name"
            if [ ! -d "$plugin_root" ]; then
              # Check with pluginRoot prefix
              echo "ERROR: Plugin directory not found: $plugin_root"
              error=1
              continue
            fi
            if [ ! -f "$plugin_root/.claude-plugin/plugin.json" ]; then
              echo "ERROR: Missing plugin.json in $plugin_root"
              error=1
            fi
            echo "OK: $plugin_name structure valid"
          done
          exit $error

      - name: Test mn.eject deterministic backend
        run: node --test plugins/marvin-core-pack/skills/mn.eject/eject.test.mjs

      - name: Verify cli/src/lib/eject-core.mjs is in sync with canonical
        run: node cli/scripts/sync-core.mjs --check

      - name: Test marvin CLI
        run: node --test cli/src/marvin.test.mjs

      - name: Test adapter contract
        run: node --test cli/src/adapters/adapters.test.mjs

      - name: Test Codex adapter (fixture-diff + unit)
        run: node --test cli/src/adapters/codex.test.mjs

      - name: Smoke-test marvin init --target=codex
        run: |
          set -euo pipefail
          REPO="$GITHUB_WORKSPACE"
          # marvin-core-pack: must succeed and match committed fixture (acceptance #1)
          scratch=$(mktemp -d)
          (cd "$scratch" && node "$REPO/cli/bin/marvin.mjs" init marvin-core-pack --target=codex --source "$REPO" --offline >/dev/null)
          test -f "$scratch/.codex/.marvin-eject.json" || { echo "codex manifest missing"; exit 1; }
          # marvin-taskmaster-pack: must exit 3 (acceptance #3)
          if (cd "$scratch" && node "$REPO/cli/bin/marvin.mjs" init marvin-taskmaster-pack --target=codex --source "$REPO" --offline 2>/dev/null); then
            echo "ERROR: codex+taskmaster should have exited 3 but succeeded"; exit 1
          else
            code=$?
            if [ "$code" != "3" ]; then echo "ERROR: expected exit 3, got $code"; exit 1; fi
          fi
          echo "codex smoke: ok (core-pack succeeded, taskmaster refused with exit 3)"

      - name: Lint adapter boundary in cli/src/commands/
        run: |
          set -e
          # No target-specific path literals in command files.
          if grep -nE '\.claude/|\.codex/|\.cursor/' cli/src/commands/*.mjs; then
            echo "ERROR: cli/src/commands/ must not embed target-specific path literals."
            echo "Resolve paths via getAdapter(name).pathFor() / .manifestPath()."
            exit 1
          fi
          # No direct adapter-impl imports — must go through the registry.
          if grep -nE 'from "\.\./adapters/(claude|codex|cursor)\.mjs"|from "\./adapters/(claude|codex|cursor)\.mjs"' cli/src/commands/*.mjs; then
            echo "ERROR: cli/src/commands/ must import via cli/src/adapters/index.mjs (registry)."
            exit 1
          fi
          echo "ok: adapter boundary clean"

      - name: Smoke-test marvin init against all packs
        run: |
          set -euo pipefail
          REPO="$GITHUB_WORKSPACE"
          for pack in marvin-core-pack marvin-security-pack marvin-taskmaster-pack; do
            scratch=$(mktemp -d)
            echo "::group::marvin init $pack -> $scratch"
            (cd "$scratch" && node "$REPO/cli/bin/marvin.mjs" init "$pack" --source "$REPO" --offline)
            test -f "$scratch/.claude/.marvin-eject.json" || { echo "manifest missing for $pack"; exit 1; }
            (cd "$scratch" && node "$REPO/cli/bin/marvin.mjs" status --source "$REPO" --offline --json | node -e "
              const d = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              if (!d.entries.length) { console.error('status returned no entries'); process.exit(1); }
              if (d.entries.some(e => e.upToDate !== true)) {
                console.error('status reports outdated entries immediately after init');
                process.exit(1);
              }
            ")
            (cd "$scratch" && node "$REPO/cli/bin/marvin.mjs" update --source "$REPO" --offline >/dev/null)
            echo "::endgroup::"
          done

      - name: Run claude plugin validate (if available)
        continue-on-error: true
        run: |
          if command -v claude &> /dev/null; then
            claude plugin validate .
          else
            echo "Claude CLI not available in CI, skipping claude plugin validate"
          fi
